<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Níveis de Tinta - Impressoras Sobral</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="admin.css">
  <style>
    .ph-sub   { font-size: 12px; color: var(--mt); margin-bottom: 16px; }
    .lupd { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--mt); margin-bottom: 20px; }
    .dot  { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); animation: pulse 2s 5 forwards; flex-shrink: 0; }

    .alert-global { margin-bottom: 16px; background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.25); border-radius: 10px; padding: 14px 18px; font-size: 13px; color: var(--no); }
    .alert-global .alert-title { display: flex; align-items: center; gap: 10px; font-weight: 700; margin-bottom: 10px; }
    .alert-global .ico { font-size: 20px; flex-shrink: 0; }
    .alert-items { display: flex; flex-direction: column; gap: 6px; }
    .alert-item { display: flex; align-items: center; justify-content: space-between; gap: 12px; background: rgba(239,68,68,.07); border: 1px solid rgba(239,68,68,.18); border-radius: 8px; padding: 9px 14px; cursor: pointer; transition: background .15s, border-color .15s; text-align: left; font-family: inherit; color: inherit; width: 100%; }
    .alert-item:hover { background: rgba(239,68,68,.15); border-color: rgba(239,68,68,.35); }
    .alert-item-setor { font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 6px; }
    .alert-item-detalhe { font-size: 11px; color: var(--mt); margin-top: 2px; }
    .alert-item-right { font-size: 11px; color: var(--no); white-space: nowrap; text-align: right; }
    .card.highlight { animation: highlight-pulse 1.6s ease; }
    @keyframes highlight-pulse { 0%,100% { box-shadow: none; } 20%,60% { box-shadow: 0 0 0 3px rgba(239,68,68,.5), 0 4px 20px rgba(239,68,68,.2); } }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

    .card { background: var(--card); border: 1px solid var(--bd); border-radius: 12px; overflow: hidden; transition: border-color .2s, box-shadow .2s; }
    .card:hover { border-color: #ccc; box-shadow: 0 4px 16px rgba(0,0,0,.08); }
    .card.crit  { border-color: rgba(239,68,68,.35); }

    .ctop { padding: 14px 16px 12px; border-bottom: 1px solid var(--bd); display: flex; justify-content: space-between; align-items: center; }
    .pname { font-size: 15px; font-weight: 700; }
    .pip   { font-size: 12px; color: var(--accent); font-weight: 600; margin-top: 2px; }
    .ploc  { font-size: 10px; color: var(--mt); margin-top: 2px; }
    .pmod  { font-size: 10px; color: var(--mt); margin-top: 2px; }

    .sbadge { padding: 4px 10px; font-size: 10px; }

    .inks { padding: 16px; }
    .irow { margin-bottom: 14px; }
    .irow:last-child { margin-bottom: 0; }
    .imeta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .iname { font-size: 11px; color: var(--mt); text-transform: uppercase; letter-spacing: .5px; display: flex; align-items: center; gap: 7px; }
    .idot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .idot.cyan    { background: var(--cy); box-shadow: 0 0 6px var(--cy); }
    .idot.magenta { background: var(--mg); box-shadow: 0 0 6px var(--mg); }
    .idot.yellow  { background: var(--yw); box-shadow: 0 0 6px var(--yw); }
    .idot.black   { background: var(--bk); }

    .ipct    { font-size: 14px; font-weight: 800; font-variant-numeric: tabular-nums; }
    .ipct.ok { color: var(--ok); } .ipct.wn { color: #f59e0b; } .ipct.cr { color: var(--no); }

    .bar  { height: 12px; }
    .fill { position: relative; }
    .fill.cyan    { background: var(--cy); }
    .fill.magenta { background: var(--mg); }
    .fill.yellow  { background: var(--yw); }
    .fill.black   { background: var(--bk); }
    .fill.low::after { content: ''; position: absolute; inset: 0; background: rgba(239,68,68,.35); animation: flash 1s 6 forwards; }

    .nosnmp { color: var(--mt); font-size: 12px; padding: 20px; text-align: center; }

    .cfoot { padding: 10px 16px; border-top: 1px solid var(--bd); display: flex; justify-content: space-between; align-items: center; }
    .lck   { font-size: 10px; color: var(--mt); }
    .btr   { background: rgba(251,102,2,.08); border: 1px solid rgba(251,102,2,.2); color: var(--blue); padding: 4px 10px; border-radius: 5px; font-size: 10px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all .2s; }
    .btr:hover { background: var(--blue); color: #fff; }

    .refresh-row { display: flex; justify-content: center; padding-top: 24px; }
    .btn-refresh { background: var(--card); border: 1px solid var(--bd); color: var(--mt); padding: 12px 28px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 10px; font-family: inherit; }
    .btn-refresh:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .btn-refresh:disabled { opacity: .5; cursor: not-allowed; }
    .btn-atualizar { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.2); color: var(--tx); padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; font-family: inherit; }
    .btn-atualizar:hover:not(:disabled) { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-atualizar:disabled { opacity: .5; cursor: not-allowed; }
    .spin { display: inline-block; animation: spin .8s linear infinite; }

    .filter-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
    .btn-filtro { background: var(--card); border: 1.5px solid var(--bd); color: var(--mt); padding: 7px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; }
    .btn-filtro:hover { border-color: var(--accent); color: var(--accent); }
    .btn-filtro.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-filtro.active-ok { background: var(--ok); border-color: var(--ok); color: #fff; }
    .btn-filtro.active-no { background: var(--no); border-color: var(--no); color: #fff; }
    .filtro-vazio { grid-column: 1/-1; text-align: center; padding: 40px 0; color: var(--mt); font-size: 13px; }

    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
      .ctop { flex-wrap: wrap; gap: 8px; }
      .alert-item { flex-wrap: wrap; }
      .alert-item-right { text-align: left; }
      .lupd { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
<script src="admin-auth.js"></script>
<script>requireAuth(); initTheme();</script>

<div class="loader" id="loader"><div class="spinner"></div></div>

<aside class="sidebar">
  <div class="sb-brand">
    <div class="sb-dot"></div>
    <div><strong>Impressoras Sobral</strong><span>Gerenciamento de rede</span></div>
  </div>
  <nav class="sb-nav">
    <a href="admin.html"        class="sb-item">📊 Dashboard</a>
    <a href="dispositivos.html" class="sb-item">🖨️ Dispositivos</a>
    <a href="cadastrar.html"    class="sb-item">➕ Cadastrar</a>
    <a href="tinta.html"        class="sb-item">🖋️ Níveis de Tinta</a>
    <a href="estoque.html"      class="sb-item">📦 Estoque</a>
    <a href="usuarios.html"     class="sb-item">👥 Usuários</a>
  </nav>
  <div class="sb-footer">
    <div class="sb-user">
      <div class="sb-avatar">👤</div>
      <div><strong id="userLabel">—</strong><span>Administrador</span></div>
    </div>
    <button id="themeBtn" class="sb-theme" onclick="toggleTheme()">🌙 Escuro</button>
    <button class="sb-logout" onclick="logout()">Sair</button>
  </div>
</aside>

<div class="main-wrap">
  <div class="main-topbar">
    <span class="main-title">🖨️ Níveis de Tinta</span>
    <div style="display:flex;align-items:center;gap:14px">
      <button id="btn-atualizar" class="btn-atualizar" onclick="carregar()">Atualizar Agora</button>
      <span id="clock" class="main-clock"></span>
    </div>
  </div>
  <main class="main-content">
    <div class="ph-sub">Níveis consultados em tempo real via SNMP · Atualiza a cada 30s</div>
    <div class="lupd"><div class="dot" aria-hidden="true"></div><span id="lupd">Aguardando...</span></div>

    <div class="filter-bar">
      <button class="btn-filtro active" id="f-todos"   onclick="setFiltro('todos')">Todos</button>
      <button class="btn-filtro"        id="f-online"  onclick="setFiltro('online')">🟢 Online</button>
      <button class="btn-filtro"        id="f-offline" onclick="setFiltro('offline')">🔴 Offline</button>
    </div>

    <div class="alert-global" id="alertbox" style="display:none" role="alert">
      <div class="alert-title"><span class="ico" aria-hidden="true">⚠️</span><span id="alertmsg"></span></div>
      <div class="alert-items" id="alertitems"></div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="refresh-row">
      <button class="btn-refresh" id="btn-refresh" onclick="carregar()">
        <span id="rspin"></span> Verificar todos os níveis agora
      </button>
    </div>
  </main>
</div>

<script>
  initUserLabel(); initClock(); setActiveNav();

  let dadosCache = [];
  let timerId    = null;
  let filtroAtivo = 'todos';

  const esc = t => String(t ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'})[m]);

  function corC(nome) {
    const n = nome.toLowerCase();
    if (n.includes('cyan')   || n.includes('ciano'))   return 'cyan';
    if (n.includes('magenta'))                          return 'magenta';
    if (n.includes('yellow') || n.includes('amarelo'))  return 'yellow';
    return 'black';
  }

  function pClass(v) { return v <= 10 ? 'cr' : v <= 25 ? 'wn' : 'ok'; }
  function tBaixa(s) { return (s || []).some(x => x.percentual <= 15); }

  function setFiltro(f) {
    filtroAtivo = f;
    ['todos','online','offline'].forEach(k => {
      const btn = document.getElementById('f-' + k);
      btn.className = 'btn-filtro' + (k === f ? (k === 'online' ? ' active-ok' : k === 'offline' ? ' active-no' : ' active') : '');
    });
    renderizar();
  }

  function setBotoes(carregando) {
    document.getElementById('btn-atualizar').disabled = carregando;
    document.getElementById('btn-refresh').disabled   = carregando;
    const rs = document.getElementById('rspin');
    rs.textContent = carregando ? '↺' : '';
    rs.className   = carregando ? 'spin' : '';
  }

  async function carregar() {
    setBotoes(true);
    document.getElementById('loader').classList.add('show');
    try {
      const res = await fetch('/api/dashboard');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      dadosCache = await res.json();
      renderizar();
      document.getElementById('lupd').textContent = 'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');
    } catch(e) {
      console.error(e);
      document.getElementById('grid').innerHTML =
        '<div class="empty error" role="alert">Erro ao carregar dados. Verifique a conexão com o servidor.</div>';
    } finally {
      document.getElementById('loader').classList.remove('show');
      setBotoes(false);
    }
  }

  function renderizar() {
    const g     = document.getElementById('grid');
    const agora = new Date().toLocaleTimeString('pt-BR');

    const criticos = dadosCache.filter(p => p.online && tBaixa(p.suprimentos));
    const ab = document.getElementById('alertbox');
    const am = document.getElementById('alertmsg');
    const ai = document.getElementById('alertitems');
    if (criticos.length) {
      ab.style.display = 'block';
      am.textContent = criticos.length + ' impressora(s) com tinta crítica — clique para localizar';
      ai.innerHTML = criticos.map(p => {
        const coresBaixas = (p.suprimentos || [])
          .filter(s => s.percentual <= 15)
          .map(s => `${s.nome} ${s.percentual}%`)
          .join(' · ');
        const setor = p.localizacao || p.ip;
        return `<button class="alert-item" onclick="irParaCard(${p.id})">
          <div>
            <div class="alert-item-setor">📍 ${esc(setor)}</div>
            <div class="alert-item-detalhe">${esc(p.nome)} · ${esc(p.ip)}</div>
          </div>
          <div class="alert-item-right">⚠️ ${esc(coresBaixas)}</div>
        </button>`;
      }).join('');
    } else {
      ab.style.display = 'none';
    }

    if (!dadosCache.length) {
      g.innerHTML = '<div class="empty">Nenhuma impressora cadastrada. <a href="admin.html" style="color:var(--blue)">Acesse o Admin</a> para adicionar.</div>';
      return;
    }

    const lista = filtroAtivo === 'online'  ? dadosCache.filter(p =>  p.online)
                : filtroAtivo === 'offline' ? dadosCache.filter(p => !p.online)
                : dadosCache;

    if (!lista.length) {
      g.innerHTML = `<div class="filtro-vazio">Nenhuma impressora ${filtroAtivo === 'online' ? 'online' : 'offline'} no momento.</div>`;
      return;
    }

    g.innerHTML = lista.map(p => {
      const sup   = Array.isArray(p.suprimentos) ? p.suprimentos : [];
      const baixa = tBaixa(sup);
      return `
        <div class="card ${baixa ? 'crit' : ''}" id="card-${p.id}">
          <div class="ctop">
            <div>
              <div class="pname">${esc(p.nome)}</div>
              <div class="pip">${esc(p.ip)}</div>
              <div class="pmod">${esc(p.modelo || 'Canon')}</div>
              ${p.localizacao ? `<div class="ploc">📍 ${esc(p.localizacao)}</div>` : ''}
            </div>
            <div class="sbadge ${p.online ? 'on' : 'off'}" aria-label="${p.online ? 'Online' : 'Offline'}">${p.online ? '● ONLINE' : '● OFFLINE'}</div>
          </div>
          <div class="inks">
            ${sup.length ? sup.map(s => {
              const c   = corC(s.nome);
              const cls = pClass(s.percentual);
              const low = s.percentual <= 15;
              return `
                <div class="irow">
                  <div class="imeta">
                    <div class="iname"><div class="idot ${c}" aria-hidden="true"></div>${esc(s.nome)}</div>
                    <span class="ipct ${cls}">${s.percentual}%</span>
                  </div>
                  <div class="bar"><div class="fill ${c} ${low ? 'low' : ''}" style="width:${s.percentual}%" role="progressbar" aria-valuenow="${s.percentual}" aria-valuemin="0" aria-valuemax="100"></div></div>
                </div>`;
            }).join('') : '<div class="nosnmp">Impressora offline — sem dados SNMP</div>'}
          </div>
          <div class="cfoot">
            <span class="lck">Verificado: ${agora}</span>
            ${p.online ? `<a class="btr" href="http://${esc(p.ip)}" target="_blank" rel="noopener">Abrir Interface</a>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  function irParaCard(id) {
    const card = document.getElementById('card-' + id);
    if (!card) return;
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    card.classList.remove('highlight');
    void card.offsetWidth;
    card.classList.add('highlight');
  }

  function iniciarTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(carregar, 30000);
  }

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      clearInterval(timerId);
      timerId = null;
    } else {
      carregar();
      iniciarTimer();
    }
  });

  carregar();
  iniciarTimer();
</script>
</body>
</html>
