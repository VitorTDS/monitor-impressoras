<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impressoras Sobral | Acesso</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    :root {
      --bg: #F4F4F4; --card: #ffffff; --accent: #FB6602;
      --tx: #1a1a1a; --mt: #6E6E6E; --bd: #e5e5e5;
      --no: #ef4444; --ok: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--tx);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--accent);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
    }
    .logo { color: #fff; font-size: 15px; font-weight: 900; display: flex; align-items: center; gap: 10px; }
    .logo-dot { width: 8px; height: 8px; background: rgba(255,255,255,0.6); border-radius: 50%; }

    .body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      background: var(--card);
      border-radius: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 400px;
      overflow: hidden;
    }

    .card-header {
      background: var(--accent);
      padding: 28px 32px;
    }
    .card-header h1 { color: #fff; font-size: 20px; font-weight: 800; }
    .card-header p  { color: rgba(255,255,255,0.8); font-size: 13px; margin-top: 4px; }

    .card-body { padding: 28px 32px; }

    .form-group { margin-bottom: 16px; }
    label { font-size: 11px; font-weight: 700; color: var(--mt); text-transform: uppercase; letter-spacing: .8px; display: block; margin-bottom: 6px; }
    input {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--bd);
      padding: 11px 14px;
      border-radius: 8px;
      color: var(--tx);
      font-size: 14px;
      font-family: inherit;
      transition: border-color .2s, background .2s;
    }
    input:focus { outline: none; border-color: var(--accent); background: #fff; }

    .msg { font-size: 13px; min-height: 18px; margin-bottom: 8px; }
    .msg.error   { color: var(--no); }
    .msg.success { color: var(--ok); }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 13px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: filter .2s;
    }
    .btn-primary:hover    { filter: brightness(1.08); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; filter: none; }

    .loading-overlay {
      position: fixed; inset: 0;
      background: rgba(244,244,244,.85);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    .loading-overlay.show { opacity: 1; pointer-events: all; }
    .loading-spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--bd);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-bottom: 16px;
    }
    .loading-overlay p { font-size: 14px; color: var(--mt); }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 400px) {
      .card-header { padding: 20px; }
      .card-body   { padding: 20px; }
    }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <p>Entrando no sistema...</p>
  </div>

  <div class="topbar">
    <div class="logo">
      <div class="logo-dot"></div>
      Impressoras Sobral
    </div>
  </div>

  <div class="body">
    <div class="card">
      <div class="card-header">
        <h1 id="card-title">Bem-vindo</h1>
        <p id="card-subtitle">Entre com suas credenciais para acessar o sistema</p>
      </div>
      <div class="card-body">
        <div id="screen-login">
          <form onsubmit="doLogin(); return false;">
            <div class="form-group">
              <label>Usuário</label>
              <input type="text" id="login-user" placeholder="seu.usuario" autocomplete="username" />
            </div>
            <div class="form-group">
              <label>Senha</label>
              <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
            </div>
            <div class="msg" id="login-msg"></div>
            <button type="submit" class="btn-primary" id="btn-entrar">Entrar no sistema →</button>
          </form>
        </div>

        <div id="screen-trocar-senha" style="display:none">
          <div style="background:#fff7ed;border-left:3px solid #f59e0b;padding:12px 14px;border-radius:6px;margin-bottom:20px;font-size:13px;color:#92400e;line-height:1.5">
            Por segurança, crie uma senha pessoal antes de continuar.
          </div>
          <form onsubmit="doTrocarSenha(); return false;">
            <div class="form-group">
              <label>Nova senha</label>
              <input type="password" id="nova-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
            </div>
            <div class="form-group">
              <label>Confirmar nova senha</label>
              <input type="password" id="nova-pass-confirm" placeholder="Repita a nova senha" autocomplete="new-password" />
            </div>
            <div class="msg" id="trocar-msg"></div>
            <button type="submit" class="btn-primary" id="btn-trocar">Definir senha e entrar →</button>
          </form>
        </div>
      </div>
    </div>
  </div>

<script>
  /* ─── Sessão ─── */
  function getToken() {
    try { return JSON.parse(sessionStorage.getItem('ic_token') || 'null'); } catch { return null; }
  }

  let _tempToken = null;

  /* ─── Se já está logado, redireciona ─── */
  (function() {
    const t = getToken();
    if (t && t.token) {
      document.getElementById('loadingOverlay').classList.add('show');
      window.location.href = 'admin.html';
    }
  })();

  /* ─── Feedback visual ─── */
  function showMsg(elId, text, type) {
    const el = document.getElementById(elId);
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  /* ─── Login ─── */
  async function doLogin() {
    const usuario = document.getElementById('login-user').value.trim();
    const senha   = document.getElementById('login-pass').value;
    showMsg('login-msg', '', '');

    if (!usuario || !senha) { showMsg('login-msg', 'Preencha usuário e senha.', 'error'); return; }

    const btn = document.getElementById('btn-entrar');
    btn.disabled = true;
    btn.textContent = 'Verificando...';

    try {
      const res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usuario, senha })
      });
      const data = await res.json();

      if (!res.ok || !data.ok) {
        showMsg('login-msg', data.erro || 'Usuário ou senha incorretos.', 'error');
        btn.disabled = false;
        btn.textContent = 'Entrar no sistema →';
        return;
      }

      if (data.trocar_senha) {
        _tempToken = data.temp_token;
        document.getElementById('screen-login').style.display = 'none';
        document.getElementById('screen-trocar-senha').style.display = 'block';
        document.getElementById('card-title').textContent = 'Criar nova senha';
        document.getElementById('card-subtitle').textContent = 'Defina uma senha pessoal para continuar.';
        document.getElementById('nova-pass').focus();
        return;
      }

      sessionStorage.setItem('ic_token', JSON.stringify({ token: data.token, usuario: data.usuario }));
      showMsg('login-msg', '✓ Acesso autorizado! Redirecionando...', 'success');
      setTimeout(() => {
        document.getElementById('loadingOverlay').classList.add('show');
        setTimeout(() => { window.location.href = 'admin.html'; }, 400);
      }, 700);
    } catch {
      showMsg('login-msg', 'Erro de conexão. Verifique o servidor.', 'error');
      btn.disabled = false;
      btn.textContent = 'Entrar no sistema →';
    }
  }

  /* ─── Troca de senha obrigatória ─── */
  async function doTrocarSenha() {
    const nova = document.getElementById('nova-pass').value;
    const conf = document.getElementById('nova-pass-confirm').value;
    showMsg('trocar-msg', '', '');

    if (nova.length < 6) { showMsg('trocar-msg', 'Senha deve ter ao menos 6 caracteres.', 'error'); return; }
    if (nova !== conf)   { showMsg('trocar-msg', 'As senhas não coincidem.', 'error'); return; }

    const btn = document.getElementById('btn-trocar');
    btn.disabled = true;
    btn.textContent = 'Salvando...';

    try {
      const res  = await fetch('/api/auth/trocar-senha', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ temp_token: _tempToken, nova_senha: nova })
      });
      const data = await res.json();

      if (!res.ok || !data.ok) {
        showMsg('trocar-msg', data.erro || 'Erro ao trocar senha.', 'error');
        btn.disabled = false;
        btn.textContent = 'Definir senha e entrar →';
        return;
      }

      sessionStorage.setItem('ic_token', JSON.stringify({ token: data.token, usuario: data.usuario }));
      showMsg('trocar-msg', '✓ Senha definida! Redirecionando...', 'success');
      setTimeout(() => {
        document.getElementById('loadingOverlay').classList.add('show');
        setTimeout(() => { window.location.href = 'admin.html'; }, 400);
      }, 700);
    } catch {
      showMsg('trocar-msg', 'Erro de conexão. Verifique o servidor.', 'error');
      btn.disabled = false;
      btn.textContent = 'Definir senha e entrar →';
    }
  }

</script>
</body>
</html>
