<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impressoras Sobral | Acesso</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    :root {
      --bg: #0a0a0a; --card: #161616; --accent: #FB6602;
      --tx: #F4F4F4; --mt: #6E6E6E; --bd: #2a2a2a;
      --red: #ef4444; --ok: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--tx);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
      overflow: hidden;
    }

    /* Grid de fundo */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(251,102,2,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(251,102,2,0.05) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* Brilho azul central */
    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(251,102,2,0.10) 0%, transparent 65%);
      top: 50%; left: 50%;
      transform: translate(-50%, -60%);
      pointer-events: none;
    }

    .container {
      position: relative;
      width: 100%; max-width: 400px;
      z-index: 1;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo-area {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-icon {
      display: inline-flex;
      align-items: center; justify-content: center;
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #FB6602 0%, #d45600 100%);
      border-radius: 16px;
      margin-bottom: 14px;
      box-shadow: 0 0 32px rgba(251,102,2,0.35);
    }

    .logo-icon svg { width: 30px; height: 30px; }

    .logo-title {
      font-family: 'Courier New', monospace;
      font-size: 20px;
      font-weight: 700;
      color: var(--tx);
      letter-spacing: -0.5px;
    }

    .logo-title span { color: var(--accent); }

    .logo-sub {
      font-size: 12px;
      color: var(--mt);
      margin-top: 4px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    /* Card principal */
    .card {
      background: var(--card);
      border: 1px solid var(--bd);
      border-radius: 16px;
      padding: 28px 28px 24px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--bd);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 22px;
      gap: 4px;
    }

    .tab {
      flex: 1;
      padding: 9px;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--mt);
      cursor: pointer;
      border-radius: 7px;
      transition: all 0.2s;
      user-select: none;
      border: none;
      background: none;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    /* Formulário */
    .form-group { margin-bottom: 14px; }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--mt);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--bd);
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 14px;
      color: var(--tx);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .form-group input::placeholder { color: #475569; }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(251,102,2,0.15);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 6px 0 14px;
    }

    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px;
      background: var(--bd);
    }

    .divider span {
      font-size: 11px;
      color: var(--mt);
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    /* Botão principal */
    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      cursor: pointer;
      margin-top: 6px;
      transition: filter 0.2s, transform 0.1s;
      letter-spacing: 0.2px;
    }

    .btn-primary:hover { filter: brightness(1.1); }
    .btn-primary:active { transform: scale(0.98); }

    /* Mensagem de feedback */
    .msg {
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-top: 2px;
      margin-bottom: 10px;
      display: none;
    }

    .msg.error {
      background: rgba(239,68,68,0.12);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.2);
      display: block;
    }

    .msg.success {
      background: rgba(16,185,129,0.12);
      color: #6ee7b7;
      border: 1px solid rgba(16,185,129,0.2);
      display: block;
    }

    /* Tela de sucesso */
    .success-screen {
      text-align: center;
      padding: 12px 0 4px;
      display: none;
    }

    .success-icon {
      width: 64px; height: 64px;
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }

    .success-icon svg {
      width: 30px; height: 30px;
      stroke: #10b981;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .success-screen h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--tx);
      margin-bottom: 8px;
    }

    .success-screen p {
      font-size: 13px;
      color: var(--mt);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    /* Rodapé */
    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: #334155;
      letter-spacing: 0.3px;
    }

    /* Tela de carregamento pós-login */
    .loading-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .loading-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .loading-spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--bd);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-overlay p {
      font-size: 14px;
      color: var(--mt);
    }

    @media (max-width: 400px) {
      .card { padding: 20px 16px 18px; }
      .logo-area { margin-bottom: 20px; }
    }
  </style>
</head>
<body>

  <!-- Overlay de carregamento pós-login -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <p>Entrando no sistema...</p>
  </div>

  <div class="container">

    <!-- Logo -->
    <div class="logo-area">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 9V5a1 1 0 011-1h10a1 1 0 011 1v4"/>
          <rect x="2" y="9" width="20" height="9" rx="2"/>
          <path d="M6 14h.01M10 14h.01"/>
          <path d="M8 18v2h8v-2"/>
        </svg>
      </div>
      <div class="logo-title">IMPRESSORAS-SOBRAL<span></span></div>
      <div class="logo-sub">Gestão de Impressoras · Sobral</div>
    </div>

    <!-- Card -->
    <div class="card">

      <!-- ======== TELA LOGIN ======== -->
      <div id="screen-login">
        <div class="form-group">
          <label>Usuário</label>
          <input type="text" id="login-user" placeholder="seu.usuario" autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div class="msg" id="login-msg"></div>
        <button class="btn-primary" id="btn-entrar" onclick="doLogin()">Entrar no sistema →</button>
      </div>

    </div><!-- /.card -->

    <div class="footer">Impressoras Sobral &nbsp;·&nbsp; VitinhoQuebradeira &nbsp;·&nbsp; Sobral / CE</div>
  </div>

<script>
  /* ─── Sessão ─── */
  function getToken() {
    try { return JSON.parse(sessionStorage.getItem('ic_token') || 'null'); } catch { return null; }
  }

  /* ─── Se já está logado, redireciona ─── */
  (function() {
    const t = getToken();
    if (t && t.token) {
      document.getElementById('loadingOverlay').classList.add('show');
      window.location.href = 'dashboard.html';
    }
  })();

  /* ─── Feedback visual ─── */
  function showMsg(text, type) {
    const el = document.getElementById('login-msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  /* ─── Login ─── */
  async function doLogin() {
    const usuario = document.getElementById('login-user').value.trim();
    const senha   = document.getElementById('login-pass').value;
    showMsg('', '');

    if (!usuario || !senha) { showMsg('Preencha usuário e senha.', 'error'); return; }

    const btn = document.getElementById('btn-entrar');
    btn.disabled = true;
    btn.textContent = 'Verificando...';

    try {
      const res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usuario, senha })
      });
      const data = await res.json();

      if (!res.ok || !data.ok) {
        showMsg(data.erro || 'Usuário ou senha incorretos.', 'error');
        btn.disabled = false;
        btn.textContent = 'Entrar no sistema →';
        return;
      }

      sessionStorage.setItem('ic_token', JSON.stringify({ token: data.token, usuario: data.usuario }));
      showMsg('✓ Acesso autorizado! Redirecionando...', 'success');
      setTimeout(() => {
        document.getElementById('loadingOverlay').classList.add('show');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 400);
      }, 700);
    } catch {
      showMsg('Erro de conexão. Verifique o servidor.', 'error');
      btn.disabled = false;
      btn.textContent = 'Entrar no sistema →';
    }
  }

  /* ─── Enter ─── */
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
